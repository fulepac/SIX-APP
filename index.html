<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, orientation=any">
    <title>SIX APP v.5.8 - PRO</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* --- CSS CORE --- */
        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #0f0; font-family: monospace; margin: 0; padding: 5px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        .brand-title { color: #0f0; font-size: 3.5rem; text-align: center; margin: 10px 0; text-shadow: 0 0 15px #0f0; font-weight: 900; }
        .credits { text-align: center; color: #008800; font-size: 0.75rem; margin-bottom: 20px; font-weight: bold; background: rgba(0,20,0,0.5); padding: 5px; border-radius: 5px; line-height: 1.2; }
        #menu { background: #111; padding: 15px; border-radius: 15px; border: 1px solid #333; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
        input, select { background: #000; border: 1px solid #0f0; color: #0f0; padding: 12px; border-radius: 8px; font-size: 1rem; }

        .btn-info { background: #003300; color: #0f0; border: 1px solid #0f0; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .master-zone { border: 1px solid #444; padding: 10px; border-radius: 10px; background: #0a0a0a; margin: 10px 0; }
        .m-title { font-size: 0.75rem; color: #888; margin: 5px 0; text-transform: uppercase; letter-spacing: 1px; }

        .mode-selector { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-bottom: 10px; }
        .mode-btn { background: #222; color: #0f0; border: 1px solid #0f0; padding: 10px 2px; font-size: 0.65rem; border-radius: 5px; font-weight: bold; }
        .mode-btn.active { background: #0f0; color: #000; box-shadow: 0 0 10px #0f0; }

        .m-config-grid { display: flex; flex-direction: column; gap: 5px; }
        .m-row { display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; }
        .m-row input, .m-row select { width: 95px; padding: 5px; font-size: 0.8rem; text-align: center; }

        .slot-list { background: #000; border: 1px solid #333; margin: 10px 0; max-height: 150px; overflow-y: auto; }
        .obj-slot { display: grid; grid-template-columns: 30px 80px 1fr 1fr; gap: 5px; padding: 8px 5px; border-bottom: 1px solid #222; align-items: center; }
        .obj-slot input { padding: 5px; font-size: 0.7rem; border-color: #333; }

        /* Game UI */
        .top-bar { display: flex; justify-content: space-between; align-items: center; background: #111; padding: 10px; border-radius: 10px; border: 1px solid #040; margin-bottom: 5px; height: 50px; }
        .countdown-display { font-size: 1.2rem; font-weight: bold; }
        .score-display { display: flex; gap: 10px; }
        .score-box { padding: 5px 10px; border-radius: 5px; font-weight: bold; border: 1px solid rgba(255,255,255,0.1); }
        .score-box.red { background: #300; color: #f00; }
        .score-box.blue { background: #003; color: #0ff; }

        .map-system { flex-grow: 1; position: relative; display: flex; gap: 5px; min-height: 300px; }
        .map-main-container { flex-grow: 1; border: 2px solid #0f0; border-radius: 15px; overflow: hidden; position: relative; background: #000; }
        #map-rotate, #map { width: 100%; height: 100%; transition: transform 0.15s cubic-bezier(0,0,0.5,1); }
        #player-pointer { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1000; color: #fff; font-size: 30px; pointer-events: none; text-shadow: 0 0 5px #000; transition: transform 0.15s linear; }
        
        .map-controls-external { display: flex; flex-direction: column; gap: 8px; }
        .ext-btn { flex: 1; background: #111; border: 1.5px solid #0f0; color: #0f0; border-radius: 10px; width: 55px; font-size: 1.4rem; cursor: pointer; }

        .game-info-container { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; height: 120px; margin-top: 5px; }
        .info-section { background: #0a0a0a; border: 1px solid #333; padding: 8px; overflow-y: auto; border-radius: 10px; }
        .info-section h3 { font-size: 0.7rem; margin: 0 0 5px 0; color: #555; border-bottom: 1px solid #222; }
        .data-list { list-style: none; padding: 0; margin: 0; font-size: 0.75rem; }
        .data-list li { padding: 8px 0; border-bottom: 1px solid #111; display: flex; justify-content: space-between; align-items: center; }

        .btn-start, .btn-start-master { background: #0f0; color: #000; padding: 15px; font-weight: bold; border-radius: 10px; border: none; width: 100%; margin-top: 5px; cursor: pointer; text-transform: uppercase; }
        .btn-danger { background: #300; color: #f00; border: 1px solid red; width: 100%; padding: 15px; border-radius: 10px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .exit-btn { position: absolute; top: 65px; left: 15px; background: rgba(50,50,50,0.8); color: white; border: 1px solid #444; padding: 8px; border-radius: 5px; z-index: 5000; font-size: 0.7rem; cursor: pointer; }

        .nav-hud { position: absolute; bottom: 10px; left: 10px; right: 10px; background: rgba(0,0,0,0.85); border: 2px solid yellow; padding: 12px; border-radius: 12px; z-index: 4000; display: flex; justify-content: space-between; align-items: center; color: yellow; box-shadow: 0 0 15px rgba(255,255,0,0.3); }
        .nav-stop-btn { background: #440; color: yellow; border: 1px solid yellow; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        .obj-label { background: transparent !important; border: none !important; box-shadow: none !important; color: white !important; font-weight: bold; text-shadow: 2px 2px 2px #000; font-size: 11px !important; }

        /* Area Selection Overlay */
        #map-selection-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10000; background: #000; display: none; flex-direction: column; }
        #selection-map { flex-grow: 1; width: 100%; }
        #area-hint { position: absolute; top: 10px; width: 100%; text-align: center; z-index: 10005; pointer-events: none; }
        #area-hint span { background: rgba(0,0,0,0.85); color: #0f0; padding: 8px 15px; border: 1px solid #0f0; border-radius: 5px; font-size: 0.8rem; }
        
        #btn-center-selection { position: absolute; bottom: 120px; right: 20px; z-index: 10010; background: #111; border: 2.5px solid #0f0; color: #0f0; width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; box-shadow: 0 0 20px rgba(0,255,0,0.4); cursor: pointer; active { background: #030; } }
        .selection-footer { height: 100px; background: #000; display: flex; align-items: center; justify-content: center; gap: 15px; padding: 15px; border-top: 1px solid #333; }
    </style>
</head>
<body>

    <div id="setup-screen">
        <header id="main-header">
            <h1 class="brand-title">SIX APP</h1>
            <div class="credits">Versione: 5.8_080326_1658<br>Modifica: 08/03/2026 16:58</div>
        </header>

        <div id="menu">
            <button class="btn-info" onclick="alert('Toccare gli obiettivi per navigare. In modalità orizzontale la mappa ruota col telefono.')">📖 HELP VELOCE</button>

            <input id="playerName" placeholder="NOME OPERATORE">
            <select id="teamSelect">
                <option value="RED">TEAM ROSSO</option>
                <option value="BLUE">TEAM BLU</option>
            </select>

            <div class="master-zone">
                <input id="masterPass" type="password" placeholder="PASSWORD MASTER" oninput="checkMasterPass()">
                <div id="masterTools" style="display:none;">
                    <p class="m-title">CONFIGURAZIONE SERVER</p>
                    <div class="mode-selector">
                        <button id="btnDomination" type="button" class="mode-btn active" onclick="selectGameMode('DOMINATION')">DOMINIO</button>
                        <button id="btnRecon" type="button" class="mode-btn" onclick="selectGameMode('RECON')">RECON</button>
                        <button id="btnRandom" type="button" class="mode-btn" onclick="selectGameMode('RANDOM')">RANDOM</button>
                    </div>
                    
                    <div class="m-config-grid">
                        <div class="m-row"><span>DURATA (MIN):</span><input id="gameDuration" type="number" value="30"></div>
                        <div class="m-row"><span>FORMATO COORD:</span>
                            <select id="coordFormat">
                                <option value="DEC">DECIMALI</option>
                                <option value="UTM">UTM (32T)</option>
                            </select>
                        </div>
                    </div>

                    <div id="random-config" style="display:none; border: 1px dashed #0f0; padding: 10px; margin-top: 10px;">
                        <p class="m-title">RANDOM SETTINGS</p>
                        <div class="m-row"><span>NUMERO OBJ:</span><input id="rndCount" type="number" value="3" min="1"></div>
                        <button class="btn-info" style="width:100%; margin-top:10px;" onclick="startAreaSelection()">📐 SELEZIONA AREA DI GIOCO</button>
                    </div>

                    <p id="obj-list-title" class="m-title">LISTA OBIETTIVI</p>
                    <div id="objSlotContainer" class="slot-list"></div>
                    
                    <button class="btn-start-master" onclick="enableSensorsAndStart(true)">🚀 AVVIA E SINCRONIZZA</button>
                    <button class="btn-danger" onclick="resetBin()">🔥 CANCELLA TUTTO</button>
                </div>
            </div>
            
            <button id="playerStartBtn" class="btn-start" onclick="enableSensorsAndStart(false)">▶ PARTECIPA AL GIOCO</button>
        </div>
    </div>

    <div id="map-selection-overlay">
        <div id="area-hint"><span>TRASCINA LA MAPPA O USA 🎯 PER CENTRARE</span></div>
        <div id="selection-map"></div>
        <div id="btn-center-selection" onclick="centerSelectionOnPlayer()">🎯</div>
        <div class="selection-footer">
            <button class="btn-start" style="margin:0; flex:2;" onclick="confirmArea()">CONFERMA AREA</button>
            <button class="btn-danger" style="margin:0; flex:1;" onclick="cancelArea()">ANNULLA</button>
        </div>
    </div>

    <div id="game-ui" style="display:none;">
        <button class="exit-btn" onclick="exitGame()">LOGOUT</button>
        <div class="top-bar">
            <div id="timer" class="countdown-display">⏱️ --:--</div>
            <div id="score-panel" class="score-display">
                <div class="score-box red">R: <span id="scoreRed">0</span></div>
                <div class="score-box blue">B: <span id="scoreBlue">0</span></div>
            </div>
        </div>
        <div class="map-system">
            <div class="map-main-container">
                <div id="map-rotate"><div id="map"></div></div>
                <div id="player-pointer">▲</div>
                <div id="nav-overlay" class="nav-hud" style="display:none;">
                    <div id="nav-text">IN NAVIGAZIONE...</div>
                    <button onclick="stopNavigation()" class="nav-stop-btn">CHIUDI</button>
                </div>
            </div>
            <div class="map-controls-external">
                <button onclick="centerMap()" class="ext-btn">🎯</button>
                <button onclick="map.zoomIn()" class="ext-btn">➕</button>
                <button onclick="map.zoomOut()" class="ext-btn">➖</button>
            </div>
        </div>
        <div class="game-info-container">
            <div class="info-section">
                <h3>📍 TARGETS</h3>
                <ul id="scoreboard" class="data-list"></ul>
            </div>
            <div class="info-section">
                <h3>👥 COMPAGNI</h3>
                <ul id="playerList" class="data-list"></ul>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        /* --- LOGICA SIX APP --- */
        const BIN_ID = "696d4940ae596e708fe53514";
        const SECRET_KEY = "$2a$10$8flpC9MOhAbyRpJOlsFLWO.Mb/virkFhLrl9MIFwETKeSkmBYiE2e";
        const URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
        const PWD_MASTER = "71325";

        let customRandomBounds = null;
        let lastCompass = 0;
        let state = { 
            isMaster: false, playerName: "", playerTeam: "", playerMarker: null, 
            autoCenter: true, selectedMode: "DOMINATION", targetObj: null, navLine: null, startTime: null 
        };

        let activeMarkers = [];
        let map, sMap, sRectangle;

        window.onload = () => {
            initMap();
            const saved = localStorage.getItem("six_app_session");
            if (saved) {
                const data = JSON.parse(saved);
                document.getElementById("playerName").value = data.name || "";
                document.getElementById("teamSelect").value = data.team || "RED";
            }
        };

        function initMap() {
            map = L.map("map", { zoomControl: false, attributionControl: false, scrollWheelZoom: true }).setView([45.2377, 8.8097], 18);
            L.tileLayer('https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', { subdomains:['mt0','mt1','mt2','mt3'], maxZoom: 21 }).addTo(map);
            map.on('dragstart', () => state.autoCenter = false);
        }

        /* --- CORREZIONE ORIENTAMENTO DINAMICO --- */
        function handleOrientation(e) {
            let heading = e.webkitCompassHeading || (360 - e.alpha);
            // Correzione automatica per rotazione schermo orizzontale/verticale
            let screenAngle = 0;
            if (window.screen && window.screen.orientation) {
                screenAngle = window.screen.orientation.angle;
            } else if (typeof window.orientation !== 'undefined') {
                screenAngle = window.orientation;
            }
            
            let correctedHeading = (heading + screenAngle) % 360;

            if(Math.abs(correctedHeading - lastCompass) > 0.8) {
                lastCompass = correctedHeading;
                // Ruota la mappa e il puntatore in senso opposto
                document.getElementById("map-rotate").style.transform = `rotate(${-correctedHeading}deg)`;
                document.getElementById("player-pointer").style.transform = `translate(-50%, -50%) rotate(${correctedHeading}deg)`;
            }
        }

        /* --- SELEZIONE AREA CON CENTRATURA GPS --- */
        function startAreaSelection() {
            document.getElementById("map-selection-overlay").style.display = "flex";
            if (!sMap) {
                sMap = L.map("selection-map", { attributionControl: false }).setView([45.2377, 8.8097], 17);
                L.tileLayer('https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', { subdomains:['mt0','mt1','mt2','mt3'], maxZoom: 21 }).addTo(sMap);
                sRectangle = L.rectangle(sMap.getBounds().pad(-0.3), {color: "#0f0", weight: 3, fillOpacity: 0.2, interactive: false}).addTo(sMap);
                sMap.on('move', () => { sRectangle.setBounds(sMap.getBounds().pad(-0.25)); });
            }
            setTimeout(() => { 
                sMap.invalidateSize();
                centerSelectionOnPlayer(); // Centra subito all'apertura
            }, 400);
        }

        function centerSelectionOnPlayer() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(p => {
                    const pos = [p.coords.latitude, p.coords.longitude];
                    sMap.setView(pos, 18);
                    // Forza il rettangolo a ricalcolarsi sulla nuova vista
                    sRectangle.setBounds(sMap.getBounds().pad(-0.25));
                }, (err) => console.log("GPS non pronto"), {enableHighAccuracy: true});
            }
        }

        function confirmArea() { customRandomBounds = sRectangle.getBounds(); document.getElementById("map-selection-overlay").style.display = "none"; }
        function cancelArea() { document.getElementById("map-selection-overlay").style.display = "none"; }

        /* --- FORMATO COORDINATE UTM 32T --- */
        function formatCoords(lat, lon) {
            if(document.getElementById("coordFormat")?.value === "UTM") {
                // Conversione semplificata per zona 32T (Nord Italia)
                const easting = Math.round((lon - 9) * 80000 + 500000);
                const northing = Math.round(lat * 111132);
                return `32T E:${easting} N:${northing}`;
            }
            return `${lat.toFixed(6)}, ${lon.toFixed(6)}`;
        }

        function checkMasterPass() {
            if(document.getElementById("masterPass").value === PWD_MASTER) {
                state.isMaster = true;
                document.getElementById("masterTools").style.display = "block";
                document.getElementById("playerStartBtn").style.display = "none";
                loadConfigFromServer();
            }
        }

        function selectGameMode(m) {
            state.selectedMode = m;
            document.querySelectorAll(".mode-btn").forEach(b => b.classList.remove("active"));
            document.getElementById(`btn${m.charAt(0) + m.slice(1).toLowerCase()}`).classList.add("active");
            document.getElementById("random-config").style.display = (m === 'RANDOM') ? "block" : "none";
            document.getElementById("objSlotContainer").style.display = (m === 'RANDOM') ? "none" : "block";
        }

        async function enableSensorsAndStart(isMasterAction) {
            state.playerName = document.getElementById("playerName").value.trim().toUpperCase();
            state.playerTeam = document.getElementById("teamSelect").value;
            if(!state.playerName) return alert("INSERISCI NOME OPERATORE!");

            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(res => {
                    if(res === 'granted') window.addEventListener('deviceorientation', handleOrientation);
                    isMasterAction ? saveAndStart() : startGame();
                });
            } else {
                window.addEventListener('deviceorientation', handleOrientation);
                isMasterAction ? saveAndStart() : startGame();
            }
        }

        async function saveAndStart() {
            state.startTime = Date.now();
            await sync(true, parseInt(document.getElementById("gameDuration").value));
            startGame();
        }

        async function startGame() {
            document.getElementById("setup-screen").style.display = "none";
            document.getElementById("game-ui").style.display = "block";
            map.invalidateSize();
            if ("geolocation" in navigator) {
                navigator.geolocation.watchPosition((p) => {
                    const pos = [p.coords.latitude, p.coords.longitude];
                    if(!state.playerMarker) {
                        state.playerMarker = L.circleMarker(pos, {radius: 9, color: '#fff', fillColor: '#007bff', fillOpacity: 1, weight: 3}).addTo(map);
                        map.setView(pos, 18);
                    } else {
                        state.playerMarker.setLatLng(pos);
                        if(state.autoCenter) map.panTo(pos);
                    }
                    updateNavigationLine();
                }, null, { enableHighAccuracy: true });
            }
            setInterval(() => sync(false), 4000);
        }

        async function sync(forceMaster, duration) {
            try {
                const res = await fetch(`${URL}/latest`, { headers: {"X-Master-Key":SECRET_KEY}, cache:'no-store'});
                let { record } = await res.json();
                if(!record.players) record.players = {};
                record.players[state.playerName] = { team: state.playerTeam, lat: state.playerMarker?.getLatLng().lat || 0, lon: state.playerMarker?.getLatLng().lng || 0, last: Date.now() };

                if(state.isMaster || forceMaster) {
                    record.game = { 
                        mode: state.selectedMode, scoreRed: record.game?.scoreRed || 0, scoreBlue: record.game?.scoreBlue || 0,
                        start: forceMaster ? state.startTime : (record.game?.start || Date.now()),
                        duration: duration || record.game?.duration || 30
                    };
                    if (state.selectedMode === 'RANDOM' && forceMaster) {
                        record.objectives = generateRandomObjectives(parseInt(document.getElementById("rndCount").value));
                    } else if (state.selectedMode !== 'RANDOM' && (state.isMaster || forceMaster)) {
                        let newObjs = [];
                        document.querySelectorAll(".obj-slot").forEach(s => {
                            if(s.querySelector(".s-active").checked) {
                                newObjs.push({ name: s.querySelector(".s-name").value, lat: parseFloat(s.querySelector(".s-lat").value), lon: parseFloat(s.querySelector(".s-lon").value), owner: "LIBERO" });
                            }
                        });
                        record.objectives = newObjs;
                    }
                }
                await fetch(URL, { method:"PUT", headers:{"Content-Type":"application/json","X-Master-Key":SECRET_KEY}, body: JSON.stringify(record)});
                updateUI(record);
            } catch(e) {}
        }

        function generateRandomObjectives(count) {
            const b = customRandomBounds || map.getBounds();
            let o = [];
            for(let i=0; i<count; i++) {
                o.push({
                    name: `RND-${i+1}`,
                    lat: b.getSouth() + Math.random() * (b.getNorth() - b.getSouth()),
                    lon: b.getWest() + Math.random() * (b.getEast() - b.getWest()),
                    owner: "LIBERO"
                });
            }
            return o;
        }

        function updateUI(r) {
            activeMarkers.forEach(m => map.removeLayer(m)); activeMarkers = [];
            const scoreboard = document.getElementById("scoreboard");
            scoreboard.innerHTML = "";

            (r.objectives || []).forEach(obj => {
                let color = obj.owner === 'RED' ? '#f00' : obj.owner === 'BLUE' ? '#0ff' : '#fff';
                let m = L.circle([obj.lat, obj.lon], {radius: 15, color: color, weight: 3, fillOpacity: 0.2}).addTo(map);
                m.bindTooltip(obj.name, {permanent:true, direction:'top', className:'obj-label'});
                
                // Navigazione attiva in ogni modalità al click
                m.on('click', () => startNavigation(obj));
                activeMarkers.push(m);
                scoreboard.innerHTML += `<li onclick='startNavigation(${JSON.stringify(obj)})'>${obj.name} <span style="color:${color}">${obj.owner}</span></li>`;
            });

            if(r.game) {
                const remain = (r.game.duration * 60) - Math.floor((Date.now() - r.game.start) / 1000);
                document.getElementById("timer").innerText = remain > 0 ? `⏱️ ${Math.floor(remain/60)}:${(remain%60).toString().padStart(2,'0')}` : "TERMINATO";
                document.getElementById("scoreRed").innerText = r.game.scoreRed;
                document.getElementById("scoreBlue").innerText = r.game.scoreBlue;
            }

            const pList = document.getElementById("playerList"); pList.innerHTML = "";
            Object.entries(r.players || {}).forEach(([name, p]) => {
                if(Date.now() - p.last < 30000 && p.team === state.playerTeam && name !== state.playerName) {
                    pList.innerHTML += `<li>${name} <span>${getDist(p.lat, p.lon)}m</span></li>`;
                    activeMarkers.push(L.circleMarker([p.lat, p.lon], {radius: 7, color: p.team==='RED'?'#f00':'#0ff', fillColor: p.team==='RED'?'#f00':'#0ff', fillOpacity:0.8}).addTo(map));
                }
            });
        }

        function startNavigation(obj) { 
            state.targetObj = obj; 
            document.getElementById("nav-overlay").style.display = "flex"; 
            updateNavigationLine(); 
        }

        function stopNavigation() { state.targetObj = null; if(state.navLine) map.removeLayer(state.navLine); document.getElementById("nav-overlay").style.display = "none"; }

        function updateNavigationLine() {
            if(!state.targetObj || !state.playerMarker) return;
            const p1 = state.playerMarker.getLatLng();
            const p2 = [state.targetObj.lat, state.targetObj.lon];
            const dist = getDist(p2[0], p2[1]);
            document.getElementById("nav-text").innerHTML = `<b>${state.targetObj.name}</b><br>${dist}mt | ${formatCoords(p2[0], p2[1])}`;
            if(state.navLine) map.removeLayer(state.navLine);
            state.navLine = L.polyline([p1, p2], {color: 'yellow', weight: 4, dashArray: '10, 10'}).addTo(map);
        }

        function getDist(lat2, lon2) {
            if(!state.playerMarker) return "?";
            const p1 = state.playerMarker.getLatLng();
            const R = 6371000;
            const dLat = (lat2 - p1.lat) * Math.PI / 180;
            const dLon = (lon2 - p1.lng) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(p1.lat * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        async function loadConfigFromServer() {
            try {
                const res = await fetch(`${URL}/latest`, { headers: {"X-Master-Key":SECRET_KEY}});
                const { record } = await res.json();
                const container = document.getElementById("objSlotContainer");
                container.innerHTML = "";
                const currentObjs = record.objectives || [];
                for (let i = 0; i < 8; i++) {
                    let o = currentObjs[i] || { name: `OBJ${i+1}`, lat: "", lon: "" };
                    container.innerHTML += `<div class="obj-slot"><input type="checkbox" class="s-active" ${o.lat?'checked':''}> <input type="text" class="s-name" value="${o.name}"> <input type="number" class="s-lat" value="${o.lat}" step="any"> <input type="number" class="s-lon" value="${o.lon}" step="any"></div>`;
                }
            } catch(e) {}
        }

        function centerMap() { state.autoCenter = true; if(state.playerMarker) map.panTo(state.playerMarker.getLatLng()); }
        function exitGame() { if(confirm("USCIRE DALLA SESSIONE?")) location.reload(); }
        async function resetBin() {
            if(confirm("VUOI AZZERARE IL SERVER?")) {
                await fetch(URL, { method:"PUT", headers:{"Content-Type":"application/json","X-Master-Key":SECRET_KEY}, body: JSON.stringify({game:{mode:"DOMINATION",scoreRed:0,scoreBlue:0,start:Date.now(),duration:30},players:{},objectives:[]})});
                location.reload();
            }
        }
    </script>
</body>
</html>
