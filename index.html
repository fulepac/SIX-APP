<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SIX VIGEVANO - COMMAND & CONTROL v8.0</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root {
            --neon-green: #00ff00;
            --dark-bg: #050505;
            --panel-bg: rgba(15, 15, 15, 0.95);
            --red-team: #ff3333;
            --blue-team: #33ccff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--dark-bg); color: var(--neon-green);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        /* --- STRUTTURA SCHERMATE --- */
        .screen { 
            display: none; position: absolute; width: 100%; height: 100%; 
            flex-direction: column; transition: opacity 0.3s; 
        }
        .screen.active { display: flex; opacity: 1; }

        /* --- HEADER & DASHBOARD --- */
        .main-header {
            padding: 15px; background: #000; border-bottom: 2px solid var(--neon-green);
            text-align: center; z-index: 100;
        }
        .main-header h1 { margin: 0; font-size: 1.5rem; letter-spacing: 3px; text-transform: uppercase; }

        .server-status-box {
            margin: 10px; padding: 15px; border: 1px solid #333; border-radius: 8px;
            background: var(--panel-bg); display: flex; flex-direction: column; gap: 10px;
        }
        .status-row { display: flex; justify-content: space-between; align-items: center; }
        .indicator { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .online { background: var(--neon-green); box-shadow: 0 0 8px var(--neon-green); }
        .offline { background: #ff0000; }

        /* --- MAPPA E NAVIGAZIONE (SISTEMA ESTESO) --- */
        .navigation-container {
            flex-grow: 1; position: relative; overflow: hidden;
            background: #000; border: 1px solid #222;
        }

        /* Il contenitore che ruota deve essere ENORME per coprire la diagonale durante la rotazione */
        #map-rotation-wrapper {
            position: absolute; top: 50%; left: 50%;
            width: 300vmax; height: 300vmax; /* Estensione massima */
            transform: translate(-50%, -50%) rotate(0deg);
            will-change: transform;
        }
        #map { width: 100%; height: 100%; z-index: 1; }

        /* Overlay fissi (non ruotano con la mappa) */
        .map-overlay {
            position: absolute; inset: 0; pointer-events: none; z-index: 10;
        }
        .reticle {
            position: absolute; top: 50%; left: 50%;
            width: 60px; height: 60px; transform: translate(-50%, -50%);
            border: 1px solid rgba(0, 255, 0, 0.2); border-radius: 50%;
        }
        .reticle::before, .reticle::after {
            content: ''; position: absolute; background: var(--neon-green); opacity: 0.6;
        }
        .reticle::before { top: 50%; left: -10px; width: 80px; height: 1px; }
        .reticle::after { left: 50%; top: -10px; width: 1px; height: 80px; }

        #compass-arrow {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 40px; color: #fff; text-shadow: 0 0 15px #000;
            z-index: 11; transition: transform 0.1s;
        }

        /* --- CONTROLLI --- */
        .controls-bottom {
            padding: 10px; background: #000; border-top: 1px solid #222;
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; z-index: 100;
        }
        .btn {
            background: var(--neon-green); color: #000; border: none;
            padding: 15px; border-radius: 5px; font-weight: bold;
            text-transform: uppercase; font-size: 0.9rem; cursor: pointer;
        }
        .btn:disabled { background: #222; color: #444; }
        .btn-admin { background: #000; color: var(--neon-green); border: 1px solid var(--neon-green); }

        /* --- INFO BAR --- */
        .info-bar {
            background: #111; padding: 8px; font-size: 0.8rem;
            display: flex; justify-content: space-around; border-top: 1px solid #333;
        }

        .admin-section {
            padding: 15px; border-top: 1px dashed #f00; margin-top: 10px; display: none;
        }
    </style>
</head>
<body>

    <div id="screen-setup" class="screen active">
        <header class="main-header">
            <h1>SIX VIGEVANO</h1>
            <div style="font-size: 0.6rem; color: #666;">TACTICAL NAVIGATOR v8.0</div>
        </header>

        <div class="scroll-area" style="overflow-y: auto; flex-grow: 1;">
            <div class="server-status-box">
                <div class="status-row">
                    <span>STATO SISTEMA:</span>
                    <span id="srv-status-text"><span class="indicator offline"></span>OFFLINE</span>
                </div>
                <div class="status-row" style="font-size: 1.2rem; font-weight: bold;">
                    <span style="color: var(--red-team)">ROSSI: <span id="srv-score-red">0</span></span>
                    <span style="color: var(--blue-team)">BLU: <span id="srv-score-blue">0</span></span>
                </div>
                <div class="status-row">
                    <span>TEMPO RIMANENTE:</span>
                    <span id="srv-timer" style="color: #fff;">--:--</span>
                </div>
            </div>

            <div style="padding: 15px;">
                <label style="font-size: 0.7rem;">NOMINATIVO OPERATORE</label>
                <input id="in-name" type="text" style="width:100%; padding:12px; background:#111; border:1px solid var(--neon-green); color:#fff; margin-bottom:15px;" placeholder="ES. FULVIO">
                
                <label style="font-size: 0.7rem;">FAZIONE DI APPARTENENZA</label>
                <select id="in-team" style="width:100%; padding:12px; background:#111; border:1px solid var(--neon-green); color:#fff;">
                    <option value="TEAM1">ATTACCO (ROSSO)</option>
                    <option value="TEAM2">DIFESA (BLU)</option>
                </select>

                <div style="margin-top: 20px;">
                    <input id="admin-pass" type="password" placeholder="CODICE ADMIN" style="width:100%; padding:8px; background:#000; border:1px solid #333; color:#444; font-size:0.7rem;" oninput="checkAdminCode(this.value)">
                </div>

                <div id="admin-controls" class="admin-section">
                    <h3 style="color:red; font-size:0.8rem;">CONFIGURAZIONE MASTER</h3>
                    <button class="btn btn-admin" style="width:100%; margin-bottom:10px;" onclick="createNewMatch()">CREA NUOVA PARTITA</button>
                </div>
            </div>
        </div>

        <div class="controls-bottom">
            <button id="btn-join" class="btn" style="grid-column: span 2;" onclick="startOperation()" disabled>CONNETTI AL SERVER</button>
        </div>
    </div>

    <div id="screen-ops" class="screen">
        <div class="info-bar" style="background: #000; font-weight: bold; font-size: 1rem;">
            <span id="op-timer" style="color:#fff">--:--</span>
            <span style="color:var(--red-team)">R: <span id="op-score-red">0</span></span>
            <span style="color:var(--blue-team)">B: <span id="op-score-blue">0</span></span>
        </div>

        <div class="navigation-container">
            <div id="map-rotation-wrapper">
                <div id="map"></div>
            </div>
            
            <div class="map-overlay">
                <div class="reticle"></div>
                <div id="compass-arrow">▲</div>
            </div>

            <button onclick="state.autoCenter=true; syncMap();" style="position:absolute; bottom:20px; right:20px; z-index:100; width:50px; height:50px; border-radius:50%; background:rgba(0,0,0,0.8); border:2px solid var(--neon-green); color:var(--neon-green); font-size:1.5rem;">🎯</button>
        </div>

        <div id="utm-display" style="padding:10px; text-align:center; font-family:monospace; background:#111; font-size:0.9rem; border-top:1px solid #333;">
            CALCOLO COORDINATE...
        </div>

        <div class="info-bar">
            <span>OBJ: <span id="status-obj-summary">---</span></span>
            <span>GPS: <span id="status-gps-accuracy">---</span></span>
        </div>
    </div>

    <script>
        // CONFIGURAZIONE DATI (JSONBIN)
        const CONFIG = {
            binId: "696d4940ae596e708fe53514",
            apiKey: "$2a$10$8flpC9MOhAbyRpJOlsFLWO.Mb/virkFhLrl9MIFwETKeSkmBYiE2e",
            adminKey: "71325"
        };

        const URL = `https://api.jsonbin.io/v3/b/${CONFIG.binId}`;

        // STATO APPLICAZIONE
        let map;
        let objLayers = [];
        let state = {
            playerName: "",
            team: "",
            isAdmin: false,
            coords: [45.2377, 8.8097],
            heading: 0,
            autoCenter: true,
            serverData: null
        };

        // --- 1. INIZIALIZZAZIONE ---
        window.onload = () => {
            initMap();
            startServerMonitoring();
        };

        function initMap() {
            map = L.map('map', {
                zoomControl: false,
                attributionControl: false,
                maxZoom: 21
            }).setView(state.coords, 18);

            L.tileLayer('https://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}', {
                subdomains: ['mt0','mt1','mt2','mt3'],
                maxZoom: 21
            }).addTo(map);

            // Se l'utente trascina, fermiamo l'auto-centramento
            map.on('dragstart', () => state.autoCenter = false);

            // Geolocalizzazione continua
            if("geolocation" in navigator) {
                navigator.geolocation.watchPosition(
                    pos => {
                        state.coords = [pos.coords.latitude, pos.coords.longitude];
                        updateUTM(pos.coords.latitude, pos.coords.longitude);
                        document.getElementById('status-gps-accuracy').innerText = `±${Math.round(pos.coords.accuracy)}m`;
                        if(state.autoCenter) syncMap();
                    },
                    err => console.error("GPS Error", err),
                    { enableHighAccuracy: true }
                );
            }
        }

        // --- 2. MONITORAGGIO SERVER (ESTESO) ---
        async function startServerMonitoring() {
            setInterval(async () => {
                try {
                    const res = await fetch(`${URL}/latest`, { headers: { "X-Master-Key": CONFIG.apiKey }, cache: 'no-store' });
                    const { record } = await res.json();
                    state.serverData = record;
                    updateDashboardUI(record);
                } catch (e) {
                    console.error("Server Down");
                    document.getElementById('srv-status-text').innerHTML = `<span class="indicator offline"></span>TIMEOUT`;
                }
            }, 3000);
        }

        function updateDashboardUI(data) {
            const statusText = document.getElementById('srv-status-text');
            const btnJoin = document.getElementById('btn-join');

            if(data.game && data.game.active) {
                statusText.innerHTML = `<span class="indicator online"></span>OPERATIVO`;
                btnJoin.disabled = false;
                
                // Aggiorna punteggi e timer (Dashboard iniziale)
                document.getElementById('srv-score-red').innerText = Math.floor(data.game.scoreRed / 10);
                document.getElementById('srv-score-blue').innerText = Math.floor(data.game.scoreBlue / 10);
                
                // Aggiorna punteggi e timer (Interfaccia OPS)
                document.getElementById('op-score-red').innerText = Math.floor(data.game.scoreRed / 10);
                document.getElementById('op-score-blue').innerText = Math.floor(data.game.scoreBlue / 10);
                
                updateTimerUI(data.game.start, data.game.duration);
            } else {
                statusText.innerHTML = `<span class="indicator offline"></span>IN ATTESA`;
                btnJoin.disabled = true;
            }
        }

        function updateTimerUI(start, durationMin) {
            const elapsedSec = Math.floor((Date.now() - start) / 1000);
            const totalSec = durationMin * 60;
            const remaining = Math.max(0, totalSec - elapsedSec);
            
            const m = Math.floor(remaining / 60);
            const s = remaining % 60;
            const timeStr = `${m}:${s.toString().padStart(2, '0')}`;
            
            document.getElementById('srv-timer').innerText = timeStr;
            document.getElementById('op-timer').innerText = timeStr;
        }

        // --- 3. BUSSOLA (LOGICA ESTESA) ---
        async function startOperation() {
            state.playerName = document.getElementById('in-name').value.toUpperCase() || "SCOUT";
            state.team = document.getElementById('in-team').value;

            // Richiesta permessi bussola (iOS/Android)
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if(permission === 'granted') window.addEventListener('deviceorientation', handleRotation);
                } catch(e) { alert("Bussola non autorizzata."); }
            } else {
                window.addEventListener('deviceorientation', handleRotation);
            }

            document.getElementById('screen-setup').classList.remove('active');
            document.getElementById('screen-ops').classList.add('active');
            
            setTimeout(() => map.invalidateSize(), 400);
            
            // Loop di invio posizione
            setInterval(pushDataToServer, 5000);
        }

        function handleRotation(e) {
            // Estensione: Proviamo prima il nord magnetico assoluto
            let heading = e.webkitCompassHeading || (360 - e.alpha);
            if(heading !== undefined) {
                state.heading = Math.round(heading);
                // Ruotiamo il wrapper della mappa
                document.getElementById('map-rotation-wrapper').style.transform = `translate(-50%, -50%) rotate(${-state.heading}deg)`;
                // La freccia rimane fissa ma punta il nord della mappa ruotata
                // In questo sistema, la freccia punta "Sempre Avanti" rispetto al telefono
            }
        }

        // --- 4. LOGICA DI GIOCO (SINCRONIZZAZIONE) ---
        async function pushDataToServer() {
            if(!state.serverData) return;

            // 1. Aggiorna la mia posizione nel record locale
            state.serverData.players[state.playerName] = {
                team: state.team,
                lat: state.coords[0],
                lon: state.coords[1],
                lastSeen: Date.now()
            };

            // 2. Se sono Admin, calcola la conquista obiettivi
            if(state.isAdmin) {
                calculateObjectives();
            }

            // 3. Spedisci al server
            try {
                await fetch(URL, {
                    method: 'PUT',
                    headers: { "Content-Type": "application/json", "X-Master-Key": CONFIG.apiKey },
                    body: JSON.stringify(state.serverData)
                });
                renderGameAssets(state.serverData);
            } catch(e) { console.error("Sync Error"); }
        }

        function calculateObjectives() {
            const data = state.serverData;
            const loopSec = 5;

            data.objectives.forEach(obj => {
                let rCount = 0, bCount = 0;
                
                Object.values(data.players).forEach(p => {
                    if(Date.now() - p.lastSeen < 15000) {
                        let dist = getDistance(p.lat, p.lon, obj.lat, obj.lon);
                        if(dist <= obj.radius) {
                            p.team === 'TEAM1' ? rCount++ : bCount++;
                        }
                    }
                });

                if(rCount > 0 && bCount > 0) {
                    obj.status = "CONTESTED";
                } else {
                    obj.status = "NORMAL";
                    // Punti per chi possiede
                    if(obj.owner === 'TEAM1') data.game.scoreRed += loopSec;
                    if(obj.owner === 'TEAM2') data.game.scoreBlue += loopSec;

                    // Avanzamento conquista
                    let activeTeam = rCount > 0 ? 'TEAM1' : (bCount > 0 ? 'TEAM2' : null);
                    if(activeTeam && activeTeam !== obj.owner) {
                        obj.progress += loopSec;
                        if(obj.progress >= data.game.conqTime) {
                            obj.owner = activeTeam;
                            obj.progress = 0;
                        }
                    } else {
                        obj.progress = Math.max(0, obj.progress - loopSec);
                    }
                }
            });
        }

        function renderGameAssets(data) {
            objLayers.forEach(layer => map.removeLayer(layer));
            objLayers = [];

            data.objectives.forEach(obj => {
                let color = "#fff";
                if(obj.status === "CONTESTED") color = "#ff0";
                else if(obj.owner === "TEAM1") color = "red";
                else if(obj.owner === "TEAM2") color = "cyan";

                let circle = L.circle([obj.lat, obj.lon], {
                    radius: obj.radius,
                    color: color,
                    fillOpacity: 0.2,
                    weight: 2
                }).addTo(map);
                objLayers.push(circle);
            });
            
            document.getElementById('status-obj-summary').innerText = `${data.objectives.length} ATTIVI`;
        }

        // --- 5. FORMULE GEOMETRA (UTM ESTESO) ---
        function updateUTM(lat, lon) {
            // Proiezione Transversa di Mercatore (Semplificata ma accurata per Zona 32)
            const a = 6378137;
            const f = 1/298.257;
            const k0 = 0.9996;
            const rad = Math.PI/180;
            
            let phi = lat * rad;
            let L = lon * rad;
            let L0 = 9 * rad; // Meridiano centrale Zona 32
            
            let e2 = 2*f - f*f;
            let ep2 = e2 / (1 - e2);
            let N = a / Math.sqrt(1 - e2 * Math.sin(phi)**2);
            let T = Math.tan(phi)**2;
            let C = ep2 * Math.cos(phi)**2;
            let A = (L - L0) * Math.cos(phi);
            
            let M = a * ( (1 - e2/4 - 3*e2*e2/64) * phi - (3*e2/8 + 3*e2*e2/32) * Math.sin(2*phi) + (15*e2*e2/256) * Math.sin(4*phi) );
            
            let E = 500000 + k0 * N * (A + (1-T+C)*A**3/6 + (5-18*T+T*T+72*C)*A**5/120);
            let Nor = k0 * (M + N * Math.tan(phi) * (A**2/2 + (5-T+9*C+4*C*C)*A**4/24));
            
            document.getElementById('utm-display').innerText = `UTM-32T E: ${Math.round(E)} N: ${Math.round(Nor)}`;
        }

        // --- UTILS ---
        function getDistance(la1, lo1, la2, lo2) {
            const R = 6371000;
            const dLat = (la2-la1)*Math.PI/180;
            const dLon = (lo2-lo1)*Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function checkAdminCode(val) {
            if(val === CONFIG.adminKey) {
                state.isAdmin = true;
                document.getElementById('admin-controls').style.display = 'block';
            }
        }

        function syncMap() { map.setView(state.coords, 19); }

        async function createNewMatch() {
            const newMatch = {
                game: { active: true, start: Date.now(), duration: 60, conqTime: 60, scoreRed: 0, scoreBlue: 0 },
                objectives: [
                    { name: "HQ-RED", lat: state.coords[0]+0.001, lon: state.coords[1], radius: 25, owner: "TEAM1", status: "NORMAL", progress: 0 },
                    { name: "CENTRO", lat: state.coords[0], lon: state.coords[1], radius: 20, owner: "LIBERO", status: "NORMAL", progress: 0 },
                    { name: "HQ-BLUE", lat: state.coords[0]-0.001, lon: state.coords[1], radius: 25, owner: "TEAM2", status: "NORMAL", progress: 0 }
                ],
                players: {}
            };
            await fetch(URL, { method: 'PUT', headers: { "Content-Type": "application/json", "X-Master-Key": CONFIG.apiKey }, body: JSON.stringify(newMatch) });
            alert("Nuovo Match Creato!");
        }
    </script>
</body>
</html>
