<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SIX APP v.7.2 - OMNI-OPERATOR</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* UI GENERALE */
        .screen { display: none; height: 100%; flex-direction: column; padding: 10px; }
        .active { display: flex; }
        
        .header { text-align: center; border-bottom: 2px solid #0f0; margin-bottom: 10px; padding-bottom: 5px; }
        .header h1 { margin: 0; font-size: 2rem; text-shadow: 0 0 10px #0f0; }
        
        .scroll-area { flex-grow: 1; overflow-y: auto; padding-right: 5px; }
        
        /* BOX E INPUT */
        .box { background: #111; border: 1px solid #333; border-radius: 10px; padding: 12px; margin-bottom: 10px; }
        .label { font-size: 0.7rem; color: #888; text-transform: uppercase; display: block; margin-bottom: 5px; }
        input, select { background: #000; border: 1px solid #0f0; color: #0f0; padding: 10px; border-radius: 5px; width: 100%; font-family: monospace; }
        
        /* MASTER PANEL */
        .admin-only { border: 1px dashed #f00; padding: 10px; margin-top: 10px; display: none; }
        .obj-row { display: grid; grid-template-columns: 1fr 1fr 60px 40px; gap: 5px; margin-bottom: 8px; align-items: center; }
        .obj-row input { padding: 5px; font-size: 0.75rem; }

        /* MAPPA E MIRINI */
        .map-container { flex-grow: 1; position: relative; border: 2px solid #0f0; border-radius: 15px; overflow: hidden; background: #111; }
        #map, #map-select { width: 100%; height: 100%; position: absolute; z-index: 1; }
        
        /* FIX: Il contenitore per la rotazione deve essere alto 100% */
        #map-rotate { width: 100%; height: 100%; transition: transform 0.1s linear; }

        .crosshair { position: absolute; top: 50%; left: 50%; width: 40px; height: 40px; transform: translate(-50%, -50%); z-index: 5000; pointer-events: none; }
        .crosshair::before { content: ''; position: absolute; top: 50%; left: 0; width: 100%; height: 1px; background: rgba(0,255,0,0.7); }
        .crosshair::after { content: ''; position: absolute; left: 50%; top: 0; width: 1px; height: 100%; background: rgba(0,255,0,0.7); }
        .cross-dot { position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; background: #0f0; border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 5px #0f0; }
        
        #player-pointer { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 5001; font-size: 25px; color: #fff; pointer-events: none; text-shadow: 0 0 5px #000; }

        /* TASTI */
        .btn { background: #0f0; color: #000; border: none; padding: 15px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; text-transform: uppercase; margin: 5px 0; }
        .btn-sec { background: #000; color: #0f0; border: 1px solid #0f0; }
        .btn:disabled { background: #222; color: #444; }
        .btn-loc { position: absolute; bottom: 20px; right: 20px; z-index: 1000; width: 50px; height: 50px; border-radius: 50%; background: rgba(0,0,0,0.8); border: 2px solid #0f0; color: #0f0; font-size: 1.5rem; display: flex; align-items: center; justify-content: center; }

        /* UI GIOCO */
        .game-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .score { padding: 5px 10px; border-radius: 5px; font-weight: bold; border: 1px solid #444; }
        .score.red { color: #f00; border-color: #f00; }
        .score.blue { color: #0ff; border-color: #0ff; }
        #coord-bar { font-size: 0.75rem; text-align: center; padding: 8px; color: #0f0; background: #111; font-weight: bold; border-top: 1px solid #333; }
    </style>
</head>
<body>

    <div id="screen-setup" class="screen active">
        <div class="header"><h1>SIX VIGEVANO</h1><small>v7.2 OMNI-PROTOCOL</small></div>
        <div class="scroll-area">
            <div class="box">
                <span class="label">Operatore</span>
                <input id="playerName" type="text" placeholder="INSERISCI NOME">
                <span class="label" style="margin-top:10px;">Squadra</span>
                <select id="teamSelect">
                    <option value="TEAM1">TEAM ROSSO (ATTACCO)</option>
                    <option value="TEAM2">TEAM BLU (DIFESA)</option>
                </select>
            </div>

            <div class="box">
                <span class="label">Accesso Admin</span>
                <input id="masterPass" type="password" placeholder="PASSWORD" oninput="unlockAdmin()">
                
                <div id="admin-panel" class="admin-only">
                    <span class="label">Visualizzazione Coordinate</span>
                    <select id="coordFormat">
                        <option value="DD">Decimali (DD.dddd)</option>
                        <option value="DDM">Gradi Minuti (DD° MM.mmm')</option>
                        <option value="32T">UTM 32T (Nord/Est)</option>
                    </select>

                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px;">
                        <div><span class="label">Gara (min)</span><input id="cfg-dur" type="number" value="30"></div>
                        <div><span class="label">Conq (sec)</span><input id="cfg-conq" type="number" value="60"></div>
                    </div>

                    <button class="btn btn-sec" onclick="openMapSelect()">📐 DISEGNA AREA GIOCO</button>

                    <span class="label" style="margin-top:10px;">Obiettivi (Nome | Lat | Lon | Rad)</span>
                    <div id="obj-list-admin"></div>
                    <button class="btn btn-sec" style="font-size:0.7rem; padding:5px;" onclick="addObjRow()">+ AGGIUNGI OBIETTIVO</button>
                    <button class="btn" onclick="serverInit()">🚀 INIZIALIZZA MISSIONE</button>
                </div>
            </div>
            <button id="btn-join" class="btn" onclick="joinGame()" disabled>ATTESA AVVIO...</button>
        </div>
    </div>

    <div id="screen-select" class="screen">
        <div class="header"><h2>SET AREA</h2></div>
        <div class="map-container">
            <div id="map-select"></div>
            <div class="crosshair"><div class="cross-dot"></div></div>
            <button class="btn-loc" onclick="centerMapOnGPS(sMap)">🎯</button>
        </div>
        <div id="area-info" style="text-align:center; padding:10px; color:#0f0;">Area: 0 m²</div>
        <button class="btn" onclick="confirmArea()">CONFERMA AREA</button>
        <button class="btn btn-sec" onclick="closeMapSelect()">ANNULLA</button>
    </div>

    <div id="screen-game" class="screen">
        <div class="game-header">
            <div id="game-timer" style="font-weight:bold; font-size:1.2rem;">00:00</div>
            <div style="display:flex; gap:5px;">
                <div class="score red">R: <span id="s-red">0</span></div>
                <div class="score blue">B: <span id="s-blue">0</span></div>
            </div>
        </div>
        
        <div class="map-container">
            <div id="map-rotate"><div id="map"></div></div>
            <div class="crosshair"><div class="cross-dot"></div></div>
            <div id="player-pointer">▲</div>
            <button class="btn-loc" onclick="state.autoCenter = true; centerMapOnGPS(map);">🎯</button>
        </div>

        <div id="coord-bar">COORD: --</div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px; height:120px; margin-top:5px;">
            <div class="box" style="margin:0; overflow-y:auto; font-size:0.75rem;">
                <b style="color:#555">OBIETTIVI</b><div id="game-obj-list"></div>
            </div>
            <div class="box" style="margin:0; overflow-y:auto; font-size:0.75rem;">
                <b style="color:#555">RADAR</b><div id="game-player-list"></div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const BIN_ID = "696d4940ae596e708fe53514";
        const SECRET_KEY = "$2a$10$8flpC9MOhAbyRpJOlsFLWO.Mb/virkFhLrl9MIFwETKeSkmBYiE2e";
        const URL_BIN = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
        const MASTER_PASS = "71325";

        let map, sMap, sRect;
        let objLayers = [];
        let state = { isAdmin: false, currentPos: [45.2377, 8.8097], autoCenter: true, bounds: null };

        window.onload = () => {
            initBaseMaps();
            for(let i=0; i<3; i++) addObjRow();
            setInterval(checkGlobalStatus, 3000);
        };

        function initBaseMaps() {
            map = L.map('map', {zoomControl:false, attributionControl:false}).setView(state.currentPos, 18);
            L.tileLayer('https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {subdomains:['mt0','mt1','mt2','mt3'], maxZoom:21}).addTo(map);
            map.on('dragstart', () => state.autoCenter = false);

            navigator.geolocation.watchPosition(p => {
                state.currentPos = [p.coords.latitude, p.coords.longitude];
                updateCoordBar();
                if(state.autoCenter && map) map.panTo(state.currentPos);
            }, null, {enableHighAccuracy:true, timeout:5000});

            window.addEventListener('deviceorientation', e => {
                let heading = e.webkitCompassHeading || (360 - e.alpha);
                if(heading) {
                    document.getElementById('map-rotate').style.transform = `rotate(${-heading}deg)`;
                    document.getElementById('player-pointer').style.transform = `translate(-50%,-50%) rotate(${heading}deg)`;
                }
            });
        }

        function unlockAdmin() {
            if(document.getElementById('masterPass').value === MASTER_PASS) {
                state.isAdmin = true;
                document.getElementById('admin-panel').style.display = 'block';
            }
        }

        function addObjRow() {
            const container = document.getElementById('obj-list-admin');
            const div = document.createElement('div');
            div.className = 'obj-row';
            div.innerHTML = `
                <input type="text" class="o-name" value="OBJ ${container.children.length + 1}">
                <input type="text" class="o-lat" placeholder="Lat">
                <input type="text" class="o-lon" placeholder="Lon">
                <input type="number" class="o-rad" value="20">
            `;
            container.appendChild(div);
        }

        function openMapSelect() {
            document.getElementById('screen-setup').classList.remove('active');
            document.getElementById('screen-select').classList.add('active');
            if(!sMap) {
                sMap = L.map('map-select', {zoomControl:false, attributionControl:false}).setView(state.currentPos, 17);
                L.tileLayer('https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {subdomains:['mt0','mt1','mt2','mt3']}).addTo(sMap);
                sRect = L.rectangle(sMap.getBounds().pad(-0.2), {color:'#0f0', weight:2, fill:false}).addTo(sMap);
                sMap.on('move', () => {
                    let b = sMap.getBounds().pad(-0.2);
                    sRect.setBounds(b);
                    updateAreaStats(b);
                });
            }
            setTimeout(() => sMap.invalidateSize(), 300);
        }

        function updateAreaStats(b) {
            let sw = b.getSouthWest(), ne = b.getNorthEast();
            let w = getDistance(sw.lat, sw.lng, sw.lat, ne.lng);
            let h = getDistance(sw.lat, sw.lng, ne.lat, sw.lng);
            document.getElementById('area-info').innerText = `Area: ${Math.round(w*h)} m²`;
        }

        function confirmArea() {
            state.bounds = sRect.getBounds();
            closeMapSelect();
        }

        function closeMapSelect() {
            document.getElementById('screen-select').classList.remove('active');
            document.getElementById('screen-setup').classList.add('active');
        }

        function centerMapOnGPS(m) { if(m) m.setView(state.currentPos, 18); }

        async function serverInit() {
            let objs = [];
            document.querySelectorAll('.obj-row').forEach(row => {
                let lat = row.querySelector('.o-lat').value;
                let lon = row.querySelector('.o-lon').value;
                if(!lat || !lon) {
                    if(state.bounds) {
                        lat = state.bounds.getSouth() + Math.random()*(state.bounds.getNorth()-state.bounds.getSouth());
                        lon = state.bounds.getWest() + Math.random()*(state.bounds.getEast()-state.bounds.getWest());
                    } else {
                        lat = state.currentPos[0] + (Math.random()-0.5)*0.002;
                        lon = state.currentPos[1] + (Math.random()-0.5)*0.002;
                    }
                }
                objs.push({
                    name: row.querySelector('.o-name').value,
                    lat: parseFloat(lat), lon: parseFloat(lon),
                    radius: parseInt(row.querySelector('.o-rad').value),
                    owner: 'LIBERO', status: 'NORMAL', progress: 0
                });
            });

            const data = {
                game: { active: true, start: Date.now(), duration: parseInt(document.getElementById('cfg-dur').value), conqTime: parseInt(document.getElementById('cfg-conq').value), scoreRed: 0, scoreBlue: 0, coordFormat: document.getElementById('coordFormat').value },
                objectives: objs, players: {}
            };
            await fetch(URL_BIN, { method: 'PUT', headers: {'Content-Type': 'application/json', 'X-Master-Key': SECRET_KEY}, body: JSON.stringify(data) });
            joinGame();
        }

        async function joinGame() {
            state.playerName = document.getElementById('playerName').value.toUpperCase();
            if(!state.playerName) return alert("Inserisci Nome!");
            document.getElementById('screen-setup').classList.remove('active');
            document.getElementById('screen-game').classList.add('active');
            setTimeout(() => { map.invalidateSize(); }, 500);
            setInterval(gameLoop, 4000);
        }

        async function gameLoop() {
            try {
                const res = await fetch(`${URL_BIN}/latest`, {headers: {'X-Master-Key': SECRET_KEY}, cache: 'no-store'});
                const { record } = await res.json();
                record.players[state.playerName] = { team: document.getElementById('teamSelect').value, lat: state.currentPos[0], lon: state.currentPos[1], last: Date.now() };
                if(state.isAdmin) {
                    processGameLogic(record);
                    await fetch(URL_BIN, { method: 'PUT', headers: {'Content-Type': 'application/json', 'X-Master-Key': SECRET_KEY}, body: JSON.stringify(record) });
                }
                updateGameUI(record);
            } catch(e) {}
        }

        function processGameLogic(r) {
            const now = Date.now(); const dt = 4;
            r.objectives.forEach(obj => {
                let red = 0, blue = 0;
                Object.values(r.players).forEach(p => { if(now - p.last < 10000 && getDistance(p.lat, p.lon, obj.lat, obj.lon) < obj.radius) p.team === 'TEAM1' ? red++ : blue++; });
                if(red > 0 && blue > 0) obj.status = "CONTESTED";
                else {
                    obj.status = "NORMAL";
                    if(obj.owner === 'TEAM1') r.game.scoreRed += dt;
                    if(obj.owner === 'TEAM2') r.game.scoreBlue += dt;
                    let captor = red > 0 ? 'TEAM1' : (blue > 0 ? 'TEAM2' : null);
                    if(captor && captor !== obj.owner) {
                        obj.progress += dt;
                        if(obj.progress >= r.game.conqTime) { obj.owner = captor; obj.progress = 0; }
                    } else obj.progress = 0;
                }
            });
        }

        function updateGameUI(r) {
            state.serverCoordFormat = r.game.coordFormat;
            objLayers.forEach(l => map.removeLayer(l)); objLayers = [];
            const objDiv = document.getElementById('game-obj-list'); objDiv.innerHTML = '';
            
            r.objectives.forEach(obj => {
                let color = obj.status === 'CONTESTED' ? '#ff0' : (obj.owner==='TEAM1'?'#f00':(obj.owner==='TEAM2'?'#0ff':'#fff'));
                let l = L.circle([obj.lat, obj.lon], {radius: obj.radius, color: color, weight:2, fillOpacity:0.2}).addTo(map);
                objLayers.push(l);
                objDiv.innerHTML += `<div>${obj.name}: <span style="color:${color}">${obj.owner}</span></div>`;
            });

            document.getElementById('s-red').innerText = Math.floor(r.game.scoreRed/10);
            document.getElementById('s-blue').innerText = Math.floor(r.game.scoreBlue/10);
            let rem = Math.max(0, (r.game.duration*60) - Math.floor((Date.now()-r.game.start)/1000));
            document.getElementById('game-timer').innerText = `${Math.floor(rem/60)}:${(rem%60).toString().padStart(2,'0')}`;
        }

        function updateCoordBar() {
            let lat = state.currentPos[0], lon = state.currentPos[1];
            let fmt = state.serverCoordFormat || document.getElementById('coordFormat').value;
            let out = "";
            if(fmt === "DD") out = `${lat.toFixed(6)}, ${lon.toFixed(6)}`;
            else if(fmt === "DDM") {
                const toDDM = v => { let d = Math.floor(Math.abs(v)); let m = ((Math.abs(v)-d)*60).toFixed(4); return `${d}° ${m}'`; };
                out = `N ${toDDM(lat)} E ${toDDM(lon)}`;
            }
            else if(fmt === "32T") {
                let utm = wgs84ToUTM32T(lat, lon);
                out = `32T E: ${utm.e.toFixed(0)} N: ${utm.n.toFixed(0)}`;
            }
            document.getElementById('coord-bar').innerText = out;
        }

        function wgs84ToUTM32T(lat, lon) {
            const deg2rad = Math.PI / 180;
            const a = 6378137; const f = 1 / 298.257223563;
            const k0 = 0.9996; const FE = 500000;
            let phi = lat * deg2rad; let lambda = lon * deg2rad; let lambda0 = 9 * deg2rad;
            let e2 = 2*f - f*f; let eps = e2 / (1 - e2);
            let n = a / Math.sqrt(1 - e2 * Math.sin(phi)**2 );
            let T = Math.tan(phi)**2; let C = eps * Math.cos(phi)**2;
            let A = (lambda - lambda0) * Math.cos(phi);
            let M = a * ( (1 - e2/4 - 3*e2**2/64) * phi - (3*e2/8 + 3*e2**2/32) * Math.sin(2*phi) + (15*e2**2/256) * Math.sin(4*phi) );
            let easting = FE + k0 * n * ( A + (1-T+C)*A**3/6 + (5-18*T+T**2+72*C)*A**5/120 );
            let northing = k0 * ( M + n * Math.tan(phi) * ( A**2/2 + (5-T+9*C+4*C**2)*A**4/24 + (61-58*T+T**2+600*C)*A**6/720 ) );
            return { e: easting, n: northing };
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371000;
            const dLat = (lat2-lat1)*Math.PI/180; const dLon = (lon2-lon1)*Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        async function checkGlobalStatus() {
            try {
                const res = await fetch(`${URL_BIN}/latest`, {headers: {'X-Master-Key': SECRET_KEY}});
                const { record } = await res.json();
                document.getElementById('btn-join').disabled = !record.game.active;
                state.serverCoordFormat = record.game.coordFormat;
            } catch(e) {}
        }
    </script>
</body>
</html>
