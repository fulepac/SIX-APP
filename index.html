<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, orientation=any">
    <title>SIX APP v.6.8 - INTEGRALE</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* --- CSS TOTALE - ZERO TAGLI --- */
        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #0f0; font-family: monospace; margin: 0; padding: 5px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        .brand-title { color: #0f0; font-size: 2.8rem; text-align: center; margin: 5px 0; text-shadow: 0 0 15px #0f0; font-weight: 900; }
        .credits { text-align: center; color: #008800; font-size: 0.7rem; margin-bottom: 10px; font-weight: bold; }

        #menu { background: #111; padding: 15px; border-radius: 15px; border: 1px solid #333; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; flex-grow: 1; }
        input, select { background: #000; border: 1px solid #0f0; color: #0f0; padding: 12px; border-radius: 8px; font-size: 1rem; width: 100%; }
        
        .master-zone { border: 1px solid #444; padding: 10px; border-radius: 10px; background: #0a0a0a; margin-top: 5px; }
        .m-title { font-size: 0.75rem; color: #888; margin: 8px 0 5px 0; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; border-bottom: 1px solid #333; }
        
        .m-row { display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; margin-bottom: 8px; }
        .m-row input { width: 100px; padding: 6px; text-align: center; }

        .slot-list { background: #000; border: 1px solid #333; margin: 10px 0; max-height: 150px; overflow-y: auto; }
        .obj-slot { display: grid; grid-template-columns: 30px 1fr 60px; gap: 5px; padding: 8px 5px; border-bottom: 1px solid #222; align-items: center; }
        .obj-slot input { padding: 4px; font-size: 0.7rem; }

        /* SISTEMA MAPPA E MIRINI */
        .map-system { flex-grow: 1; position: relative; display: flex; gap: 5px; min-height: 350px; }
        .map-main-container { flex-grow: 1; border: 2px solid #0f0; border-radius: 15px; overflow: hidden; position: relative; background: #000; }
        #map, #selection-map { width: 100%; height: 100%; background: #000; }
        
        /* MIRINO CENTRO MAPPA FISSO */
        .crosshair {
            position: absolute; top: 50%; left: 50%; width: 40px; height: 40px;
            transform: translate(-50%, -50%); z-index: 5000; pointer-events: none;
        }
        .crosshair::before, .crosshair::after {
            content: ''; position: absolute; background: rgba(0, 255, 0, 0.6);
        }
        .crosshair::before { top: 50%; left: 0; width: 100%; height: 1px; }
        .crosshair::after { left: 50%; top: 0; width: 1px; height: 100%; }
        .cross-dot {
            position: absolute; top: 50%; left: 50%; width: 4px; height: 4px;
            background: #0f0; border-radius: 50%; transform: translate(-50%, -50%);
            box-shadow: 0 0 5px #0f0;
        }

        #player-pointer { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1000; color: #fff; font-size: 30px; pointer-events: none; text-shadow: 0 0 5px #000; }

        /* UI GIOCO */
        .top-bar { display: flex; justify-content: space-between; align-items: center; background: #111; padding: 10px; border-radius: 10px; border: 1px solid #040; margin-bottom: 5px; }
        .score-box { padding: 5px 12px; border-radius: 5px; font-weight: bold; font-size: 1rem; border: 1px solid transparent; text-align: center; }
        .score-box.team1 { background: #300; color: #f00; border-color: #f00; }
        .score-box.team2 { background: #003; color: #0ff; border-color: #0ff; }

        .contested-banner { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); background: #f00; color: #fff; padding: 8px 20px; border-radius: 20px; font-weight: bold; z-index: 6000; display: none; animation: pulse 0.6s infinite; font-size: 0.8rem; border: 2px solid white; }
        @keyframes pulse { 0% { transform: translateX(-50%) scale(1); } 50% { transform: translateX(-50%) scale(1.05); } 100% { transform: translateX(-50%) scale(1); } }

        .btn-start { background: #0f0; color: #000; padding: 15px; font-weight: bold; border-radius: 10px; border: none; width: 100%; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        .btn-start:disabled { background: #222; color: #444; }
        .ext-btn { background: #111; border: 1.5px solid #0f0; color: #0f0; border-radius: 10px; width: 55px; height: 55px; font-size: 1.3rem; margin-bottom: 5px; display: flex; align-items: center; justify-content: center; }

        #map-selection-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; display: none; flex-direction: column; padding: 15px; }
        .selection-footer { height: 150px; display: flex; flex-direction: column; gap: 8px; padding-top: 10px; color: #0f0; }

        #coord-display { background: rgba(0,0,0,0.8); color: #0f0; font-size: 0.75rem; padding: 5px; text-align: center; border-top: 1px solid #333; }
    </style>
</head>
<body>

    <div id="setup-screen">
        <h1 class="brand-title">SIX APP</h1>
        <div class="credits">SIX VIGEVANO - TACTICAL v.6.8</div>

        <div id="menu">
            <input id="playerName" placeholder="NOME OPERATORE">
            <select id="teamSelect">
                <option value="TEAM1">TEAM ROSSO (ATTACCO)</option>
                <option value="TEAM2">TEAM BLU (DIFESA)</option>
            </select>

            <div class="master-zone">
                <input id="masterPass" type="password" placeholder="ADMIN PASSWORD" oninput="checkMasterPass()">
                <div id="masterTools" style="display:none;">
                    <p class="m-title">CONFIGURAZIONE TECNICA</p>
                    <div class="m-row">
                        <span>FORMATO COORD:</span>
                        <select id="coordFormat" style="width: 150px; padding: 5px; font-size: 0.8rem;">
                            <option value="DD">DECIMALI (DD.dddd)</option>
                            <option value="DDM">MINUTI (DD° MM.mmm')</option>
                        </select>
                    </div>
                    <div class="m-row"><span>DURATA GARA:</span><input id="gameDuration" type="number" value="30"></div>
                    <div class="m-row"><span>CONQUISTA (S):</span><input id="conqTime" type="number" value="60"></div>
                    
                    <button class="btn-start" style="background:#004400; color:#0f0; border:1px solid #0f0;" onclick="startAreaSelection()">📐 DISEGNA AREA & RANDOM</button>
                    
                    <p class="m-title">OBIETTIVI (ON | NOME | RAGGIO)</p>
                    <div id="objSlotContainer" class="slot-list"></div>
                    
                    <button class="btn-start" onclick="enableSensorsAndStart(true)">🚀 START MISSIONE</button>
                </div>
            </div>
            <button id="playerStartBtn" class="btn-start" onclick="enableSensorsAndStart(false)" disabled>ATTESA OPERAZIONE...</button>
        </div>
    </div>

    <div id="game-ui" style="display:none;">
        <div id="contested-alert" class="contested-banner">⚠️ ZONA CONTESA</div>
        
        <div class="top-bar">
            <div id="timer" style="font-size: 1.2rem; font-weight: bold; color: #fff;">⏱️ --:--</div>
            <div style="display:flex; gap:8px;">
                <div class="score-box team1">R: <span id="scoreRed">0</span></div>
                <div class="score-box team2">B: <span id="scoreBlue">0</span></div>
            </div>
        </div>

        <div class="map-system">
            <div class="map-main-container">
                <div id="map-rotate"><div id="map"></div></div>
                <div class="crosshair"><div class="cross-dot"></div></div>
                <div id="player-pointer">▲</div>
            </div>
            <div style="display:flex; flex-direction:column;">
                <button onclick="centerMap()" class="ext-btn">🎯</button>
                <button onclick="map.zoomIn()" class="ext-btn">➕</button>
                <button onclick="map.zoomOut()" class="ext-btn">➖</button>
            </div>
        </div>

        <div id="coord-display">POS: ATTESA GPS...</div>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px; height:120px; margin-top:5px;">
            <div style="background:#0a0a0a; border:1px solid #333; padding:8px; overflow-y:auto; border-radius:10px;">
                <h3 style="font-size:0.7rem; color:#555; margin:0 0 5px 0;">📍 OBIETTIVI</h3>
                <ul id="scoreboard" style="list-style:none; padding:0; margin:0; font-size:0.75rem;"></ul>
            </div>
            <div style="background:#0a0a0a; border:1px solid #333; padding:8px; overflow-y:auto; border-radius:10px;">
                <h3 style="font-size:0.7rem; color:#555; margin:0 0 5px 0;">👥 RADAR</h3>
                <ul id="playerList" style="list-style:none; padding:0; margin:0; font-size:0.75rem;"></ul>
            </div>
        </div>
    </div>

    <div id="map-selection-overlay">
        <h2 style="color:#0f0; text-align:center; font-size:1.2rem;">DEFINIZIONE CAMPO</h2>
        <div style="flex-grow:1; position:relative; border:2px solid #0f0; border-radius:15px; overflow:hidden;">
            <div id="selection-map"></div>
            <div class="crosshair"><div class="cross-dot"></div></div>
            <button onclick="centerSelectionOnGPS()" style="position:absolute; bottom:20px; right:20px; z-index:11000; width:60px; height:60px; border-radius:50%; background:rgba(0,0,0,0.9); border:2px solid #0f0; color:#0f0; font-size:1.8rem;">🎯</button>
        </div>
        <div class="selection-footer">
            <div id="area-stats" style="text-align:center; font-weight:bold; font-size:0.9rem;">AREA: 0 m²</div>
            <div style="display:flex; gap:10px;">
                <button class="btn-start" onclick="confirmArea()">CONFERMA CAMPO</button>
                <button class="btn-start" style="background:#300; color:red; border:1px solid red;" onclick="closeSelection()">CHIUDI</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        /* --- LOGICA INTEGRALE --- */
        const BIN_ID = "696d4940ae596e708fe53514";
        const SECRET_KEY = "$2a$10$8flpC9MOhAbyRpJOlsFLWO.Mb/virkFhLrl9MIFwETKeSkmBYiE2e";
        const URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
        const PWD_MASTER = "71325";

        let map, sMap, sRectangle, lastCompass = 0, lastLogicTick = Date.now();
        let activeMarkers = [];
        let state = { 
            isMaster: false, playerName: "", playerTeam: "", playerMarker: null, 
            autoCenter: true, currentPos: [45.2377, 8.8097], customBounds: null,
            sPlayerMarker: null
        };

        window.onload = () => { 
            initMap(); 
            initSlots();
            setInterval(checkServerStatus, 3000); 
        };

        function initMap() {
            map = L.map("map", { zoomControl: false, attributionControl: false }).setView(state.currentPos, 18);
            L.tileLayer('https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', { subdomains:['mt0','mt1','mt2','mt3'], maxZoom: 21 }).addTo(map);
            map.on('dragstart', () => state.autoCenter = false);

            navigator.geolocation.watchPosition(p => {
                state.currentPos = [p.coords.latitude, p.coords.longitude];
                updateCoordDisplay();
                if(sMap && state.sPlayerMarker) state.sPlayerMarker.setLatLng(state.currentPos);
            }, null, {enableHighAccuracy: true});
        }

        function initSlots() {
            const container = document.getElementById("objSlotContainer");
            for(let i=1; i<=5; i++) {
                container.innerHTML += `
                <div class="obj-slot">
                    <input type="checkbox" class="s-active" checked>
                    <input type="text" class="s-name" value="OBJ-${i}">
                    <input type="number" class="s-rad" value="20">
                </div>`;
            }
        }

        function checkMasterPass() {
            if(document.getElementById("masterPass").value === PWD_MASTER) {
                state.isMaster = true;
                document.getElementById("masterTools").style.display = "block";
            }
        }

        /* --- LOGICA SELEZIONE AREA --- */
        function startAreaSelection() {
            document.getElementById("map-selection-overlay").style.display = "flex";
            if (!sMap) {
                sMap = L.map("selection-map", { zoomControl: false, attributionControl: false }).setView(state.currentPos, 17);
                L.tileLayer('https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', { subdomains:['mt0','mt1','mt2','mt3'] }).addTo(sMap);
                sRectangle = L.rectangle(sMap.getBounds().pad(-0.2), {color: "#0f0", weight: 2, fill: false}).addTo(sMap);
                
                sMap.on('move', () => {
                    const bounds = sMap.getBounds().pad(-0.2);
                    sRectangle.setBounds(bounds);
                    calculateArea(bounds);
                });
            }
            if(!state.sPlayerMarker) {
                state.sPlayerMarker = L.circleMarker(state.currentPos, {radius: 8, color: '#fff', fillColor: '#007bff', fillOpacity: 1}).addTo(sMap);
            }
            setTimeout(() => sMap.invalidateSize(), 300);
        }

        function calculateArea(bounds) {
            const sw = bounds.getSouthWest();
            const ne = bounds.getNorthEast();
            const width = getDist(sw.lat, sw.lng, sw.lat, ne.lng);
            const height = getDist(sw.lat, sw.lng, ne.lat, sw.lng);
            document.getElementById("area-stats").innerText = `AREA: ${Math.round(width * height)} m²`;
        }

        function centerSelectionOnGPS() {
            if(state.currentPos) sMap.setView(state.currentPos, 18);
        }

        function confirmArea() {
            state.customBounds = sRectangle.getBounds();
            alert("Campo di battaglia configurato.");
            closeSelection();
        }

        function closeSelection() { document.getElementById("map-selection-overlay").style.display = "none"; }

        /* --- CORE GAME --- */
        async function enableSensorsAndStart(isMasterAction) {
            state.playerName = document.getElementById("playerName").value.trim().toUpperCase();
            state.playerTeam = document.getElementById("teamSelect").value;
            if(!state.playerName) return alert("INSERISCI NOME");

            if (typeof DeviceOrientationEvent?.requestPermission === 'function') {
                const res = await DeviceOrientationEvent.requestPermission();
                if(res === 'granted') window.addEventListener('deviceorientation', handleOrientation);
            } else { window.addEventListener('deviceorientation', handleOrientation); }

            if(isMasterAction) {
                const duration = parseInt(document.getElementById("gameDuration").value);
                const conqSec = parseInt(document.getElementById("conqTime").value);
                let objs = [];

                if(state.customBounds) {
                    for(let i=1; i<=5; i++) {
                        objs.push({
                            name: "RND-"+i,
                            lat: state.customBounds.getSouth() + Math.random()*(state.customBounds.getNorth()-state.customBounds.getSouth()),
                            lon: state.customBounds.getWest() + Math.random()*(state.customBounds.getEast()-state.customBounds.getWest()),
                            radius: 25, owner: "LIBERO", status: "NORMAL", progress: 0
                        });
                    }
                } else {
                    document.querySelectorAll(".obj-slot").forEach(slot => {
                        if(slot.querySelector(".s-active").checked) {
                            objs.push({
                                name: slot.querySelector(".s-name").value,
                                lat: state.currentPos[0] + (Math.random()-0.5)*0.002,
                                lon: state.currentPos[1] + (Math.random()-0.5)*0.002,
                                radius: parseInt(slot.querySelector(".s-rad").value),
                                owner: "LIBERO", status: "NORMAL", progress: 0
                            });
                        }
                    });
                }

                await fetch(URL, { method:"PUT", headers:{"Content-Type":"application/json","X-Master-Key":SECRET_KEY}, body: JSON.stringify({
                    game: { active:true, start:Date.now(), duration, scoreRed:0, scoreBlue:0, conqSec },
                    players: {},
                    objectives: objs
                })});
            }
            startGame();
        }

        function startGame() {
            document.getElementById("setup-screen").style.display = "none";
            document.getElementById("game-ui").style.display = "block";
            map.invalidateSize();
            setInterval(sync, 4000);
        }

        async function sync() {
            try {
                const res = await fetch(`${URL}/latest`, { headers: {"X-Master-Key":SECRET_KEY}, cache:'no-store'});
                let { record } = await res.json();
                
                if(!record.players) record.players = {};
                record.players[state.playerName] = { 
                    team: state.playerTeam, lat: state.currentPos[0], lon: state.currentPos[1], last: Date.now() 
                };

                if(state.isMaster) {
                    const dt = (Date.now() - lastLogicTick) / 1000;
                    lastLogicTick = Date.now();
                    record.objectives.forEach(obj => {
                        let c1 = 0, c2 = 0;
                        Object.values(record.players).forEach(p => {
                            if(Date.now() - p.last < 10000 && getDist(p.lat, p.lon, obj.lat, obj.lon) < obj.radius) {
                                p.team === 'TEAM1' ? c1++ : c2++;
                            }
                        });
                        if(c1 > 0 && c2 > 0) { obj.status = "CONTESTED"; }
                        else {
                            obj.status = "NORMAL";
                            if(obj.owner === 'TEAM1') record.game.scoreRed += dt * 10;
                            if(obj.owner === 'TEAM2') record.game.scoreBlue += dt * 10;
                            let capt = c1 > 0 ? 'TEAM1' : (c2 > 0 ? 'TEAM2' : null);
                            if(capt && capt !== obj.owner) {
                                obj.progress += dt;
                                if(obj.progress >= record.game.conqSec) { obj.owner = capt; obj.progress = 0; }
                            } else { obj.progress = 0; }
                        }
                    });
                    await fetch(URL, { method:"PUT", headers:{"Content-Type":"application/json","X-Master-Key":SECRET_KEY}, body: JSON.stringify(record)});
                }
                updateUI(record);
            } catch(e){}
        }

        function updateUI(r) {
            activeMarkers.forEach(m => map.removeLayer(m)); activeMarkers = [];
            const sb = document.getElementById("scoreboard"); sb.innerHTML = "";
            let anyContested = false;

            r.objectives.forEach(obj => {
                let color = obj.status === 'CONTESTED' ? '#ff0' : (obj.owner === 'TEAM1' ? '#f00' : (obj.owner === 'TEAM2' ? '#0ff' : '#fff'));
                if(obj.status === 'CONTESTED') anyContested = true;
                L.circle([obj.lat, obj.lon], { radius: obj.radius, color, weight: 2, fillOpacity: 0.2 }).addTo(map);
                activeMarkers.push(L.marker([obj.lat, obj.lon], { icon: L.divIcon({className:'obj-label', html:`<b style="color:${color}; text-shadow:1px 1px #000; font-size:0.8rem;">${obj.name}</b>`}) }).addTo(map));
                sb.innerHTML += `<li>${obj.name}: <span style="color:${color}">${obj.owner}</span></li>`;
            });

            document.getElementById("contested-alert").style.display = anyContested ? "block" : "none";
            document.getElementById("scoreRed").innerText = Math.floor(r.game.scoreRed/10);
            document.getElementById("scoreBlue").innerText = Math.floor(r.game.scoreBlue/10);

            if(!state.playerMarker) {
                state.playerMarker = L.circleMarker(state.currentPos, {radius: 9, color: '#fff', fillColor: '#007bff', fillOpacity: 1}).addTo(map);
            } else { state.playerMarker.setLatLng(state.currentPos); }
            if(state.autoCenter) map.panTo(state.currentPos);
        }

        function handleOrientation(e) {
            let heading = e.webkitCompassHeading || (360 - e.alpha);
            document.getElementById("map-rotate").style.transform = `rotate(${-heading}deg)`;
            document.getElementById("player-pointer").style.transform = `translate(-50%,-50%) rotate(${heading}deg)`;
        }

        function updateCoordDisplay() {
            const fmt = document.getElementById("coordFormat").value;
            let lat = state.currentPos[0], lon = state.currentPos[1];
            if(fmt === "DD") {
                document.getElementById("coord-display").innerText = `POS: ${lat.toFixed(6)}, ${lon.toFixed(6)}`;
            } else {
                const toDDM = (v) => {
                    const d = Math.floor(Math.abs(v));
                    const m = ((Math.abs(v) - d) * 60).toFixed(4);
                    return `${d}° ${m}'`;
                };
                document.getElementById("coord-display").innerText = `POS: N ${toDDM(lat)} E ${toDDM(lon)}`;
            }
        }

        function getDist(lat1, lon1, lat2, lon2) {
            const R = 6371000;
            const dLat = (lat2-lat1)*Math.PI/180;
            const dLon = (lon2-lon1)*Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function centerMap() { state.autoCenter = true; map.setView(state.currentPos, 19); }
        async function checkServerStatus() {
            try {
                const res = await fetch(`${URL}/latest`, { headers: {"X-Master-Key":SECRET_KEY}, cache:'no-store'});
                const { record } = await res.json();
                document.getElementById("playerStartBtn").disabled = !record.game?.active;
            } catch(e){}
        }
    </script>
</body>
</html>
